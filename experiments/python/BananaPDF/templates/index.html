<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BananaPDF - PDF Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container" role="application" aria-label="BananaPDF - PDF Editor Application">
        <!-- Top Toolbar -->
        <div class="toolbar" role="toolbar" aria-label="Document editing toolbar">
            <div class="toolbar-group">
                <h1 tabindex="-1">BananaPDF</h1>
            </div>
            
            <div class="toolbar-group" role="group" aria-label="File operations">
                <button id="openBtn" class="btn btn-primary" title="Open PDF (Ctrl+O)" aria-label="Open a PDF file">📁 Open</button>
                <button id="saveBtn" class="btn btn-success" title="Save PDF (Ctrl+S)" aria-label="Save edited PDF" disabled>💾 Save</button>
                <button id="printBtn" class="btn" title="Print PDF (Ctrl+P)" aria-label="Print PDF" disabled>🖨️ Print</button>
            </div>
            
            <div class="toolbar-group" role="group" aria-label="View controls">
                <button id="zoomInBtn" class="btn" title="Zoom In (Ctrl+Plus)" aria-label="Zoom in" disabled>🔍+</button>
                <button id="zoomOutBtn" class="btn" title="Zoom Out (Ctrl+Minus)" aria-label="Zoom out" disabled>🔍-</button>
                <select id="zoomLevel" class="select-small" aria-label="Zoom level" disabled>
                    <option value="50">50%</option>
                    <option value="75">75%</option>
                    <option value="100" selected>100%</option>
                    <option value="125">125%</option>
                    <option value="150">150%</option>
                    <option value="200">200%</option>
                </select>
            </div>
            
            <div class="toolbar-group" role="group" aria-label="Edit controls">
                <button id="undoBtn" class="btn" title="Undo (Ctrl+Z)" aria-label="Undo last action" disabled>↶ Undo</button>
                <button id="redoBtn" class="btn" title="Redo (Ctrl+Y)" aria-label="Redo last undone action" disabled>↷ Redo</button>
            </div>
            
            <div class="toolbar-group" role="group" aria-label="Annotation tools">
                <button id="highlightBtn" class="btn tool-btn" title="Highlight (H)" aria-label="Highlight text" aria-pressed="false" disabled>🌟 Highlight</button>
                <button id="textBtn" class="btn tool-btn" title="Add Text (T)" aria-label="Add text box" aria-pressed="false" disabled>✏️ Text</button>
                <button id="commentBtn" class="btn tool-btn" title="Add Comment (C)" aria-label="Add comment" aria-pressed="false" disabled>💬 Comment</button>
                <button id="drawBtn" class="btn tool-btn" title="Draw (D)" aria-label="Draw freehand" aria-pressed="false" disabled>🖌️ Draw</button>
                <button id="signBtn" class="btn tool-btn" title="Signature (S)" aria-label="Add signature" aria-pressed="false" disabled>✍️ Sign</button>
                <button id="rotateBtn" class="btn" title="Rotate Page (R)" aria-label="Rotate current page" disabled>🔄 Rotate</button>
                <button id="deletePageBtn" class="btn btn-danger" title="Delete Page (Delete)" aria-label="Delete current page" disabled>🗑️ Delete</button>
            </div>
            
            <!-- Drawing Tools Panel (hidden by default) -->
            <div id="drawingToolsPanel" class="toolbar-group" style="display: none; gap: 10px; align-items: center;">
                <label for="brushColor" style="font-size: 12px; margin: 0;">Color:</label>
                <input type="color" id="brushColor" value="#000000" style="width: 40px; height: 32px; cursor: pointer;" aria-label="Brush color">
                
                <label for="brushType" style="font-size: 12px; margin: 0;">Brush:</label>
                <select id="brushType" style="padding: 5px; font-size: 12px;" aria-label="Brush type">
                    <option value="thin">Thin (1px)</option>
                    <option value="normal" selected>Normal (2px)</option>
                    <option value="thick">Thick (4px)</option>
                    <option value="extra">Extra (6px)</option>
                </select>
                
                <button id="clearDrawingBtn" class="btn" style="font-size: 12px; padding: 5px 10px;" title="Clear drawing">Clear</button>
            </div>
        </div>
        
        <div class="main-content">
            <!-- Left Panel: Thumbnails -->
            <div class="left-panel">
                <div class="thumbnails-container" id="thumbnailsContainer">
                    <!-- Thumbnails will be generated here -->
                </div>
            </div>
            
            <!-- Center: PDF Viewer -->
            <div class="center-panel">
                <div id="loadingIndicator" class="loading-indicator" style="display: none;">
                    <div class="spinner"></div>
                    <p>Loading PDF...</p>
                </div>
                
                <div id="emptyState" class="empty-state" role="status" aria-label="No document loaded">
                    <div class="empty-state-content">
                        <h2>📄 Open a PDF to Begin</h2>
                        <p>Drag and drop a PDF file here or click the "Open" button to start editing.</p>
                        <div class="empty-state-cta" style="display: none;">
                            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📁 Choose File</button>
                        </div>
                    </div>
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;" role="alert" aria-live="polite" aria-atomic="true">
                    <p id="errorText"></p>
                </div>
                
                <div class="pdf-viewer-container">
                    <canvas id="pdfCanvas" class="pdf-canvas"></canvas>
                    <canvas id="drawingOverlay" class="drawing-overlay" style="display: none; position: absolute; top: 0; left: 0; cursor: crosshair; z-index: 100;"></canvas>
                    <div id="annotationLayer" class="annotation-layer"></div>
                </div>
            </div>
            
            <!-- Right Panel: Properties -->
            <div class="right-panel">
                <div class="panel-section">
                    <h3>Document Info</h3>
                    <div class="info-item">
                        <label for="fileName">File Name:</label>
                        <span id="fileName" role="status" aria-label="File name">-</span>
                    </div>
                    <div class="info-item">
                        <label for="pageInfo">Pages:</label>
                        <span id="pageInfo" role="status" aria-label="Total pages">-</span>
                    </div>
                    <div class="info-item">
                        <label for="pageSelector">Current Page:</label>
                        <select id="pageSelector" aria-label="Navigate to page" disabled>
                            <!-- Options populated dynamically -->
                        </select>
                    </div>
                </div>
                
                <div class="panel-section">
                    <h3>Annotations</h3>
                    <ul id="annotationsList" role="list" aria-label="Document annotations">
                        <!-- List will be populated dynamically -->
                    </ul>
                </div>
            </div>
        </div>
        
        <!-- Status Bar -->
        <div class="status-bar" role="status" aria-live="polite" aria-atomic="false" aria-label="Editor status">
            <span id="statusText">Ready</span>
        </div>
    </div>
    
    <!-- Hidden file input for opening PDF -->
    <input type="file" id="fileInput" accept=".pdf" style="display: none;" aria-label="File picker for PDF documents">
    
    <!-- Modal for text box input -->
    <div id="textInputModal" class="modal" style="display: none;" role="dialog" aria-labelledby="textModalTitle" aria-modal="true">
        <div class="modal-content" tabindex="0">
            <button class="modal-close" aria-label="Close dialog">&times;</button>
            <h2 id="textModalTitle">Add Text</h2>
            <input type="text" id="textInput" placeholder="Enter text..." class="text-input" aria-label="Text content">
            <div class="modal-buttons">
                <button id="textConfirm" class="btn btn-primary">Add</button>
                <button id="textCancel" class="btn">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Modal for comment input -->
    <div id="commentInputModal" class="modal" style="display: none;" role="dialog" aria-labelledby="commentModalTitle" aria-modal="true">
        <div class="modal-content" tabindex="0">
            <button class="modal-close" aria-label="Close dialog">&times;</button>
            <h2 id="commentModalTitle">Add Comment</h2>
            <textarea id="commentInput" placeholder="Enter comment..." class="comment-input" aria-label="Comment content"></textarea>
            <div class="modal-buttons">
                <button id="commentConfirm" class="btn btn-primary">Add</button>
                <button id="commentCancel" class="btn">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Modal for signature -->
    <div id="signatureModal" class="modal" style="display: none;" role="dialog" aria-labelledby="signatureModalTitle" aria-modal="true">
        <div class="modal-content" tabindex="0" style="max-width: 600px;">
            <button class="modal-close" aria-label="Close dialog">&times;</button>
            <h2 id="signatureModalTitle">Add Signature</h2>
            <p style="font-size: 12px; color: #666;">Draw your signature in the box below</p>
            <div style="border: 2px solid #333; background: white; margin: 10px 0;">
                <canvas id="signatureCanvas" style="display: block; cursor: crosshair; width: 100%; height: 200px; background: white;"></canvas>
            </div>
            <div class="modal-buttons">
                <button id="signatureClear" class="btn">Clear</button>
                <button id="signatureConfirm" class="btn btn-primary">Add Signature</button>
                <button id="signatureCancel" class="btn">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
