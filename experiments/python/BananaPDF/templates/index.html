<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BananaPDF - PDF Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Top Toolbar -->
        <div class="toolbar">
            <div class="toolbar-group">
                <h1>BananaPDF</h1>
            </div>
            
            <div class="toolbar-group">
                <button id="openBtn" class="btn btn-primary" title="Open PDF">📁 Open</button>
                <button id="exportBtn" class="btn btn-success" title="Export PDF" disabled>💾 Export</button>
                <button id="printBtn" class="btn" title="Print PDF" disabled>🖨️ Print</button>
            </div>
            
            <div class="toolbar-group">
                <button id="zoomInBtn" class="btn" title="Zoom In" disabled>🔍+</button>
                <button id="zoomOutBtn" class="btn" title="Zoom Out" disabled>🔍-</button>
                <select id="zoomLevel" class="select-small" disabled>
                    <option value="50">50%</option>
                    <option value="75">75%</option>
                    <option value="100" selected>100%</option>
                    <option value="125">125%</option>
                    <option value="150">150%</option>
                    <option value="200">200%</option>
                </select>
            </div>
            
            <div class="toolbar-group">
                <button id="highlightBtn" class="btn tool-btn" title="Highlight">🌟 Highlight</button>
                <button id="textBtn" class="btn tool-btn" title="Add Text">✏️ Text</button>
                <button id="commentBtn" class="btn tool-btn" title="Add Comment">💬 Comment</button>
                <button id="drawBtn" class="btn tool-btn" title="Draw">🖌️ Draw</button>
                <button id="signBtn" class="btn tool-btn" title="Signature">✍️ Sign</button>
            </div>
            
            <div class="toolbar-group">
                <button id="rotateBtn" class="btn" title="Rotate Page" disabled>🔄 Rotate</button>
                <button id="deletePageBtn" class="btn btn-danger" title="Delete Page" disabled>🗑️ Delete</button>
            </div>
        </div>
        
        <div class="main-content">
            <!-- Left Panel: Thumbnails -->
            <div class="left-panel">
                <div class="thumbnails-container" id="thumbnailsContainer">
                    <!-- Thumbnails will be generated here -->
                </div>
            </div>
            
            <!-- Center: PDF Viewer -->
            <div class="center-panel">
                <div id="loadingIndicator" class="loading-indicator" style="display: none;">
                    <div class="spinner"></div>
                    <p>Loading PDF...</p>
                </div>
                
                <div id="emptyState" class="empty-state">
                    <div class="empty-state-content">
                        <h2>📄 Open a PDF to Begin</h2>
                        <p>Drag and drop a PDF file here or click the "Open" button to get started.</p>
                    </div>
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;">
                    <p id="errorText"></p>
                </div>
                
                <div class="pdf-viewer-container">
                    <canvas id="pdfCanvas" class="pdf-canvas"></canvas>
                    <div id="annotationLayer" class="annotation-layer"></div>
                </div>
            </div>
            
            <!-- Right Panel: Properties -->
            <div class="right-panel">
                <div class="panel-section">
                    <h3>Document Info</h3>
                    <div class="info-item">
                        <label>File Name:</label>
                        <span id="fileName">-</span>
                    </div>
                    <div class="info-item">
                        <label>Pages:</label>
                        <span id="pageInfo">-</span>
                    </div>
                    <div class="info-item">
                        <label>Current Page:</label>
                        <select id="pageSelector" disabled>
                            <!-- Options populated dynamically -->
                        </select>
                    </div>
                </div>
                
                <div class="panel-section">
                    <h3>Annotations</h3>
                    <ul id="annotationsList">
                        <!-- List will be populated dynamically -->
                    </ul>
                </div>
            </div>
        </div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <span id="statusText">Ready</span>
        </div>
    </div>
    
    <!-- Hidden file input for opening PDF -->
    <input type="file" id="fileInput" accept=".pdf" style="display: none;">
    
    <!-- Modal for text box input -->
    <div id="textInputModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Add Text</h2>
            <input type="text" id="textInput" placeholder="Enter text..." class="text-input">
            <div class="modal-buttons">
                <button id="textConfirm" class="btn btn-primary">Add</button>
                <button id="textCancel" class="btn">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Modal for comment input -->
    <div id="commentInputModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Add Comment</h2>
            <textarea id="commentInput" placeholder="Enter comment..." class="comment-input"></textarea>
            <div class="modal-buttons">
                <button id="commentConfirm" class="btn btn-primary">Add</button>
                <button id="commentCancel" class="btn">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
